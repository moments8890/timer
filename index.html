<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debate Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <button class="nav-btn active" data-target="standard-timer-section">Standard Timer</button>
        <button class="nav-btn" data-target="free-debate-section">Free Debate</button>
    </nav>

    <div class="main-content">
        <!-- Feature 1: Standard Countdown Timer -->
        <section id="standard-timer-section" class="active-section">
            <div class="timer-container">
                <h2>Standard Timer</h2>
                <div class="timer-display" id="main-timer-display">05:00</div>
                <div class="controls">
                    <button id="start-btn">Start</button>
                    <button id="pause-btn">Pause</button>
                    <button id="reset-btn">Reset</button>
                </div>
                <div class="settings">
                    <label for="duration-input">Duration (mins):</label>
                    <input type="number" id="duration-input" value="5" min="1" max="60">
                </div>
            </div>
        </section>

        <!-- Feature 2: Side-by-Side Free Debate Timer -->
        <section id="free-debate-section" class="hidden-section">
            <div class="debate-wrapper">
                <div class="debate-header">
                    <h2>Free Debate Timer</h2>
                    <div class="usage-guide">
                        <p><strong>Controls:</strong> Hover over a side to start its timer | <kbd>←</kbd> Left side | <kbd>→</kbd> Right side | <kbd>Space</kbd> or <kbd>Esc</kbd> Pause</p>
                    </div>
                    <div class="settings">
                        <div class="timer-settings">
                            <button id="reset-debate-btn">Reset Debate</button>
                        </div>
                    </div>
                </div>
                <div class="debate-container">
                    <div class="side left-side" id="side-a">
                        <h3 contenteditable="true" id="left-label">不应该</h3>
                        <div class="time-display" id="timer-a">04:00</div>
                        <p class="status">Hover to start</p>
                        <div class="side-duration">
                            <input type="number" id="duration-a" value="4" min="1" max="60">
                            <span>min</span>
                        </div>
                    </div>
                    <div class="side right-side" id="side-b">
                        <h3 contenteditable="true" id="right-label">应该</h3>
                        <div class="time-display" id="timer-b">04:00</div>
                        <p class="status">Hover to start</p>
                        <div class="side-duration">
                            <input type="number" id="duration-b" value="4" min="1" max="60">
                            <span>min</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
